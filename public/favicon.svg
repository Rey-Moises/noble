<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cccccc"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#999999"/>
    </linearGradient>
    <clipPath id="poleClip">
      <rect x="35" y="20" width="30" height="60" rx="2" />
    </clipPath>
  </defs>
  
  <!-- Pole body -->
  <rect x="35" y="20" width="30" height="60" fill="#ffffff" clip-path="url(#poleClip)"/>
  
  <!-- Red and Blue Stripes inside clip path -->
  <g clip-path="url(#poleClip)">
    <polygon points="35,10 65,30 65,45 35,25" fill="#e63946"/>
    <polygon points="35,35 65,55 65,70 35,50" fill="#1d3557"/>
    <polygon points="35,60 65,80 65,95 35,75" fill="#e63946"/>
  </g>
  
  <!-- Shading on pole for 3D effect -->
  <rect x="35" y="20" width="30" height="60" fill="url(#silver)" opacity="0.4" clip-path="url(#poleClip)"/>
  
  <!-- Top Cap -->
  <path d="M 30 20 C 30 10, 70 10, 70 20 Z" fill="url(#silver)"/>
  <rect x="32" y="18" width="36" height="4" fill="url(#silver)" rx="1"/>
  
  <!-- Bottom Cap -->
  <path d="M 30 80 C 30 90, 70 90, 70 80 Z" fill="url(#silver)"/>
  <rect x="32" y="78" width="36" height="4" fill="url(#silver)" rx="1"/>
</svg>
